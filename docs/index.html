<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Promos PY</title>
  <meta name="description" content="Promociones bancarias y el mejor ahorro en combustible en Paraguay." />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Bank <span>Promos</span></h1>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="searchInput" class="search-input" type="text" placeholder="Buscar promoción, tarjeta..." />
      </div>
    </header>

    <div class="categories" id="categories">
      <button class="category-chip active" data-cat="">Todas</button>
      <button class="category-chip" data-cat="Supermercados">🛒 Supermercados</button>
      <button class="category-chip" data-cat="Combustible">⛽ Combustible</button>
      <button class="category-chip" data-cat="Gastronomía">🍔 Gastronomía</button>
      <button class="category-chip" data-cat="Tecnología">📱 Tecnología</button>
      <button class="category-chip" data-cat="Indumentaria">👕 Indumentaria</button>
      <button class="category-chip" data-cat="Belleza">💅 Belleza</button>
    </div>

    <section class="hero" id="hero"></section>

    <section class="section">
      <h2 class="section-title">🔥 Promociones destacadas</h2>
      <div class="promo-grid" id="promoGrid">
        <div class="loading">
          <div class="spinner"></div>
          Cargando...
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">⛽ Mejor combustible</h2>
      <div class="fuel-list" id="fuelList">
        <div class="loading">
          <div class="spinner"></div>
          Cargando...
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
