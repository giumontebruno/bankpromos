name: Deploy to Koyeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install httpx

      - name: Deploy to Koyeb
        run: |
          KOYEB_TOKEN="${{ secrets.KOYOEB_API_TOKEN }}"
          APP_NAME="${{ secrets.KOYOEB_APP_NAME }}"
          SERVICE_NAME="${{ secrets.KOYOEB_SERVICE_NAME }}"

          if [ -z "$KOYEB_TOKEN" ]; then
            echo "::warning::KOYEB_TOKEN not configured - skipping deploy"
            exit 0
          fi

          APP_EXISTS=$(curl -s -X GET "https://api.koyeb.com/v1/apps" \
            -H "Authorization: Bearer $KOYEB_TOKEN" \
            -H "Content-Type: application/json" | grep -c "$APP_NAME" || true)

          if [ "$APP_EXISTS" -eq "0" ]; then
            echo "Creating app: $APP_NAME"
            curl -s -X POST "https://api.koyeb.com/v1/apps" \
              -H "Authorization: Bearer $KOYEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$APP_NAME\", \"region\": \"gra\"}"
          fi

          curl -s -X POST "https://api.koyeb.com/v1/services" \
            -H "Authorization: Bearer $KOYEB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"app\": \"$APP_NAME\",
              \"name\": \"$SERVICE_NAME\",
              \"definition\": {
                \"command\": \"uvicorn bankpromos.api:app --host 0.0.0.0 --port 8000\",
                \"port\": 8000,
                \"healthcheck\": {\"path\": \"/health\"}
              }
            }" || echo "Service may need manual update in Koyeb console"

      - name: Deployment complete
        run: |
          echo "Deployment triggered."
          echo "App: ${{ secrets.KOYOEB_APP_NAME }}"
          echo "Service: ${{ secrets.KOYOEB_SERVICE_NAME }}"
          echo "::notice::Check Koyeb console for deployment status"