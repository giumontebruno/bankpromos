name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install httpx

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          BANKPROMOS_DEBUG: true

      - name: Type check
        run: |
          pip install ruff
          ruff check bankpromos/ --exit-zero-only