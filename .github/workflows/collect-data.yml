name: Collect Bank Promotions Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright and Chromium
        run: |
          playwright install --with-deps chromium
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

      - name: Run data collection
        run: python -m bankpromos collect --all --force
        env:
          BANKPROMOS_DISABLE_LIVE_SCRAPING: false

      - name: Generate summary
        run: |
          python -c "
          from bankpromos.summary_service import run_collection_with_summary
          s = run_collection_with_summary()
          print(f'Summary: {s.total_promos} promos, {s.active_today_count} active today')
          "

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-summary
          path: data/collection_summary.json
          retention-days: 30

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push database
        run: |
          git add data/bankpromos.db
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update promotions database $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push